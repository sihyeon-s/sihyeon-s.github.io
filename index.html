<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip log</title>

<style>

@font-face {
font-family: 'Cafe24Ssurround';
src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff') format('woff');
}

body{
    font-family:'Cafe24Ssurround', sans-serif;
    text-align:center;
    background-color:#fff5fa;
}

.wrapper{
    background:white;
    width:1000px;
    margin:50px auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

.titlebar{
    display:flex;
    align-items:center;
    gap:20px;
    margin-left: 450px;
}

.trip{
    border:1px solid gray;
    padding:15px;
    margin:15px;
    width:200px;
    height:200px;
    text-align:center;
    box-shadow:3px 3px 8px gray;
    display:inline-block;
    vertical-align:top;
    border-radius:10px;
}

.trip2{
    border:1px solid gray;
    padding:15px;
    margin:15px;
    width:200px;
    height:200px;
    text-align:center;
    box-shadow:3px 3px 8px gray;
    display:inline-block;
    vertical-align:top;
    border-radius:10px;
}

a{
    margin-top:5px;
    padding:3px;
    background-color:#fad0e5;
    color:white;
    text-decoration:none;
}

.trip a{
    display:block;
    width:100%;
}

.trip2 a{
    display:block;
    width:100%;
}

.trip a:hover{
    background-color:#f589a9;
}

.trip2 a:hover{
    background-color:#f589a9;
}

h3{
    margin:5px 0;
    border-bottom:3px solid #E5E5E5;
    display:inline-block;
    padding-bottom:1px;
}

#search{
    width:200px;
    padding:8px;
    border-radius:10px;
    border:1px solid gray;
    font-family:'Cafe24Ssurround', sans-serif;
    margin-left: auto;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="titlebar">
<h1>Trip log</h1>
<input type="text" id="search" placeholder="검색" onkeyup="searchTrip()">
</div>

<div class="trip2">
<h3>부산</h3>
<p>▶2024년 8월 24일~26일</p>
<a href="busan1.html">이동</a>
<p>▶2025년 10월 10일~12일</p>
<a href="busan2.html">이동</a>
</div>

<div class="trip">
<h3>오크밸리</h3>
<p>▶2025년 1월 27일~28일</p>
<a href="oakvalley.html">이동</a>
</div>

<div class="trip">
<h3>일본</h3>
<p>▶2025년 3월 14일~16일</p>
<a href="japan.html">이동</a>
</div>

<div class="trip">
<h3>강원도 홍천</h3>
<p>▶2025년 8월 6일~7일</p>
<a href="gangwondo1.html">이동</a>
</div>

<div class="trip">
<h3>강원도 양주</h3>
<p>▶2025년 8월 16일~17일</p>
<a href="gangwondo2.html">이동</a>
</div>

<div class="trip2">
<h3>강원도 가평</h3>
<p>▶2025년 8월 28일~29일</p>
<a href="gangwondo3.html">이동</a>
<p>▶2025년 10월 5일~6일</p>
<a href="gangwondo4.html">이동</a>
</div>

<div class="trip">
<h3>엘리시안 강촌</h3>
<p>▶2026년 1월 17일~18일</p>
<a href="elysian.html">이동</a>
</div>

<div class="trip">
<h3>경기도 수원</h3>
<p>▶2026년 2월 3일~4일</p>
<a href="suwon.html">이동</a>
</div>

</div>

<script>
function searchTrip(){
let input=document.getElementById("search").value.toLowerCase();
let trips=document.querySelectorAll(".trip, .trip2");

trips.forEach(function(trip){
let text=trip.innerText.toLowerCase();

if(text.includes(input)){
trip.style.display="inline-block";
}else{
trip.style.display="none";
}
});
}
</script>

</body>
</html>
